syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "GrpcService.Protos";

package sensorreadings;

message SensorReading {
  int64 id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string device_id = 3;
  optional string location = 4;
  optional string crop_type = 5;
  optional string season = 6;
  optional double temperature = 7;
  optional double humidity = 8;
  optional double rainfall = 9;
  optional double soil_moisture = 10;
  optional double soil_ph = 11;
  optional double light_intensity = 12;
  optional double fertilizer_used = 13;
  optional bool irrigation_needed = 14;
  optional string crop_health = 15;
  optional double yield_estimate = 16;
  optional string pest_risk = 17;
  optional bool anomaly_flag = 18;
}

message SensorReadingCreateInput {
  google.protobuf.Timestamp timestamp = 1;
  string device_id = 2;
  string location = 3;
  string crop_type = 4;
  string season = 5;
  double temperature = 6;
  double humidity = 7;
  double rainfall = 8;
  double soil_moisture = 9;
  double soil_ph = 10;
  double light_intensity = 11;
  double fertilizer_used = 12;
  bool irrigation_needed = 13;
  string crop_health = 14;
  double yield_estimate = 15;
  string pest_risk = 16;
  bool anomaly_flag = 17;
}

message SensorReadingUpdateInput {
  optional google.protobuf.Timestamp timestamp = 1;
  optional string device_id = 2;
  optional string location = 3;
  optional string crop_type = 4;
  optional string season = 5;
  optional double temperature = 6;
  optional double humidity = 7;
  optional double rainfall = 8;
  optional double soil_moisture = 9;
  optional double soil_ph = 10;
  optional double light_intensity = 11;
  optional double fertilizer_used = 12;
  optional bool irrigation_needed = 13;
  optional string crop_health = 14;
  optional double yield_estimate = 15;
  optional string pest_risk = 16;
  optional bool anomaly_flag = 17;
}

message ListSensorReadingsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListSensorReadingsResponse {
  repeated SensorReading readings = 1;
}

message GetSensorReadingRequest {
  int64 id = 1;
}

message CreateSensorReadingRequest {
  SensorReadingCreateInput reading = 1;
}

message UpdateSensorReadingRequest {
  int64 id = 1;
  SensorReadingUpdateInput reading = 2;
}

message DeleteSensorReadingRequest {
  int64 id = 1;
}

message DeleteSensorReadingResponse {
  bool success = 1;
}

service SensorReadingService {
  rpc ListSensorReadings (ListSensorReadingsRequest) returns (ListSensorReadingsResponse);
  rpc GetSensorReading (GetSensorReadingRequest) returns (SensorReading);
  rpc CreateSensorReading (CreateSensorReadingRequest) returns (SensorReading);
  rpc UpdateSensorReading (UpdateSensorReadingRequest) returns (SensorReading);
  rpc DeleteSensorReading (DeleteSensorReadingRequest) returns (DeleteSensorReadingResponse);
}
